<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureon Realty LLC</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SPLASH SCREEN INTRO -->
    <div id="splash-screen">
        <div class="splash-content">
            <!-- Illuminated Keyhole -->
            <svg class="splash-keyhole" viewBox="0 0 100 150">
                <circle cx="50" cy="50" r="30" />
                <path d="M 35 70 L 65 70 L 80 140 L 20 140 Z" />
            </svg>
            
            <!-- Sliding Golden Key -->
            <svg class="splash-key" viewBox="0 0 200 80">
                <!-- Key Handle -->
                <circle cx="160" cy="40" r="25" fill="none" stroke="#D4AF37" stroke-width="8" />
                <circle cx="160" cy="40" r="10" fill="#D4AF37" />
                <!-- Key Shaft -->
                <rect x="20" y="35" width="120" height="10" fill="#D4AF37" />
                <!-- Key Teeth -->
                <rect x="30" y="45" width="10" height="25" fill="#D4AF37" />
                <rect x="50" y="45" width="10" height="15" fill="#D4AF37" />
                <rect x="70" y="45" width="10" height="25" fill="#D4AF37" />
            </svg>

            <!-- Light Explosion Source -->
            <div class="light-explosion"></div>
        </div>
    </div>

    <div class="background"></div>

    <main class="content-container">
        
        <div class="logo-box">
            <img src="logo-removebg-preview.png" alt="Aureon Realty LLC Logo" class="logo">
        </div>

        <div class="person-group">
            <h2 class="person-name">Gaurav Mehta</h2>
            <p class="person-role">Founder & Principal Advisor</p>
        </div>

        <div class="subtitle-group">
            <p class="subtitle">Private Clients <span class="divider">|</span> Family Office</p>
            <p class="subtitle">Real Asset Portfolio Advisory</p>
        </div>

        <hr class="separator short">

        <div class="contact-group">
            <p class="contact-item">Mobile : +971 50 423 62 98</p>
            <p class="contact-item">Email : Gaurav@aureon-realty.com</p>
        </div>

        <hr class="separator long">

        <div class="skyline-container">
            <svg class="css-skyline" viewBox="0 0 1000 200" preserveAspectRatio="none">
                <!-- Base Line -->
                <path class="skyline-path" pathLength="100" d="M 0 198 L 1000 198" />
                
                <!-- Dubai Skyline Silhouette -->
                <!-- Combines generic buildings, Burj Al Arab (curved), Emirates Towers, and Burj Khalifa -->
                <path class="skyline-path" pathLength="100" d="
                    M 50 198 L 50 140 L 80 140 L 80 198 
                    M 100 198 L 100 100 L 140 100 L 140 198 
                    M 160 198 L 160 80 L 170 70 L 180 80 L 180 198 
                    M 220 198 L 220 120 L 270 120 L 270 198 
                    M 300 198 L 300 80 Q 340 100 380 198 
                    M 420 198 L 420 130 L 450 130 L 450 198 
                    M 470 198 L 470 150 L 485 150 L 485 80 L 495 80 L 495 20 L 500 0 L 505 20 L 505 80 L 515 80 L 515 150 L 530 150 L 530 198 
                    M 560 198 L 560 110 L 600 110 L 600 198 
                    M 630 198 L 630 60 L 650 60 L 650 198 
                    M 680 198 L 680 120 L 740 120 L 740 198 
                    M 780 198 L 780 90 L 820 90 L 820 198 
                    M 850 198 L 850 140 L 880 140 L 880 198 
                    M 920 198 L 920 160 L 960 160 L 960 198
                " />
            </svg>
        </div>

        <footer class="footer">
            <p>Website under construction &mdash; excellence takes time</p>
        </footer>

    </main>

</body>
</html>
