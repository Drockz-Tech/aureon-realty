<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D588" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#997A15" />
    </linearGradient>
    
    <g id="base-key">
      <!-- Main Bow (donut shape) -->
      <path d="M 100 65 A 25 25 0 1 1 100 15 A 25 25 0 1 1 100 65 Z M 100 50 A 10 10 0 1 0 100 30 A 10 10 0 1 0 100 50 Z" fill-rule="evenodd"/>
      <!-- Outer small circles -->
      <circle cx="100" cy="5" r="7"/>
      <circle cx="65" cy="40" r="7"/>
      <circle cx="135" cy="40" r="7"/>
      <!-- Stem -->
      <rect x="95" y="65" width="10" height="100" rx="3"/>
    </g>
  </defs>
  
  <g fill="#000000">
    <!-- Key 1 (Top Left to Bottom Right) -->
    <g transform="translate(100, 100) rotate(-45) translate(-100, -100)">
      <use href="#base-key"/>
      <!-- Teeth pointing right -->
      <rect x="105" y="130" width="25" height="8" rx="2"/>
      <rect x="105" y="145" width="15" height="8" rx="2"/>
    </g>
    
    <!-- Key 2 (Top Right to Bottom Left) -->
    <g transform="translate(100, 100) rotate(45) translate(-100, -100)">
      <use href="#base-key"/>
      <!-- Teeth pointing left -->
      <rect x="70" y="130" width="25" height="8" rx="2"/>
      <rect x="80" y="145" width="15" height="8" rx="2"/>
    </g>
    
    <!-- Keyhole at bottom center -->
    <g transform="translate(100, 175)">
      <circle cx="0" cy="0" r="8"/>
      <path d="M -6 5 L -8 18 L 8 18 L 6 5 Z"/>
    </g>
  </g>
</svg>
